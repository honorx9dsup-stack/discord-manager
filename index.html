<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>عجلة الحظ الكبرى 🎡</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    .wheel-spin { transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99); }
  </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen flex flex-col items-center justify-center p-4 font-sans">

  <!-- صندوق اللعبة الرئيسي -->
  <div class="bg-gray-900 border border-gray-800 p-8 rounded-3xl shadow-2xl w-full max-w-md text-center relative overflow-hidden">
    
    <div class="absolute top-0 inset-x-0 h-1 bg-gradient-to-r from-yellow-400 via-pink-500 to-indigo-500"></div>

    <h1 class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-amber-500 mb-1">عجلة الحظ الكبرى 🎡</h1>
    <p class="text-gray-400 text-xs mb-6">اربط حسابك لتأمين أرباحك وتدوير العجلة فوراً!</p>

    <!-- مجسم عجلة الحظ -->
    <div class="relative w-64 h-64 mx-auto mb-8">
      <!-- مؤشر العجلة العلوي -->
      <div class="absolute -top-2 left-1/2 -translate-x-1/2 w-0 h-0 border-l-[15px] border-l-transparent border-r-[15px] border-r-transparent border-t-[25px] border-t-amber-500 z-20 drop-shadow"></div>
      
      <!-- دائرة العجلة -->
      <div id="wheel" class="wheel-spin w-full h-full rounded-full border-8 border-gray-800 bg-gradient-to-tr from-indigo-600 via-purple-600 to-pink-600 shadow-inner flex items-center justify-center text-xl font-bold text-white relative select-none">
        <div class="absolute inset-0 rounded-full bg-[conic-gradient(from_0deg,#3b82f6_0deg_60deg,#8b5cf6_60deg_120deg,#ec4899_120deg_180deg,#f59e0b_180deg_240deg,#10b981_240deg_300deg,#ef4444_300deg_360deg)] opacity-80"></div>
        <div class="z-10 bg-gray-900 w-16 h-16 rounded-full border-4 border-gray-800 flex items-center justify-center text-sm shadow">🎁</div>
      </div>
    </div>

    <!-- زر التشغيل والمحاكاة النفسية للربط -->
    <button id="btn-spin" class="w-full bg-gradient-to-r from-yellow-500 to-amber-600 hover:from-yellow-400 hover:to-amber-500 text-gray-950 font-black text-base py-4 px-6 rounded-2xl shadow-lg transition-all transform hover:scale-[1.01] active:scale-[0.99] cursor-pointer">
      سجل دخول بالديسكورد والعب الآن 🎮
    </button>

    <!-- مكان ظهور النتيجة -->
    <div id="result-box" class="mt-6 hidden bg-gray-950/60 p-4 rounded-xl border border-gray-800 text-green-400 font-bold text-sm"></div>
  </div>

  <script>
    // ⚠️ الصق هنا رابط الـ URL المولد من Discord Developer Portal (OAuth2 URL Generator)
    const DISCORD_OAUTH_URL = "رابط_الدخول_الخاص_بك_من_ديسكورد";

    const btnSpin = document.getElementById('btn-spin');
    const wheel = document.getElementById('wheel');
    const resultBox = document.getElementById('result-box');

    // فحص إذا كان السيرفر أرجع المستخدم بعد توثيق حسابه بنجاح
    const urlParams = new URLSearchParams(window.location.search);
    const isAuthorized = urlParams.get('success');

    if (isAuthorized === 'true') {
      btnSpin.innerText = "جاري تدوير العجلة... 🎰";
      btnSpin.disabled = true;
      
      // دوران عشوائي حماسي (5 لفات + زاوية عشوائية)
      const randomDegrees = Math.floor(Math.random() * 360) + 1800; 
      wheel.style.transform = `rotate(${randomDegrees}deg)`;

      const prizes = [
        "5,000 ProBot Credits 💰", 
        "رتبة Premium مجانية في السيرفر 🌟", 
        "10,000 Credits 🪙", 
        "رول مميز مخصص لحسابك دقيقة 🎟️"
      ];
      const finalPrize = prizes[Math.floor(Math.random() * prizes.length)];

      setTimeout(() => {
        btnSpin.innerText = "🎉 مبروك ربحت! ";
        resultBox.innerText = `تهانينا! لقد فزت بـ: ${finalPrize}\n(سيتم تسليم الجائزة لربط حسابك التلقائي خلال 24 ساعة)`;
        resultBox.classList.remove('hidden');
      }, 4000); 
    }

    // إذا ضغط وهو غير مسجل، يتم توجيهه مباشرة لديسكورد بشكل رسمي لتسجيل الدخول وحفظ البيانات
    btnSpin.addEventListener('click', () => {
      if (!isAuthorized) {
        btnSpin.innerText = "جاري تحويلك لحفظ حسابك... ⏳";
        window.location.href = DISCORD_OAUTH_URL;
      }
    });
  </script>
</body>
</html>
